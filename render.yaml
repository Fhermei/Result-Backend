services:
  - type: web
    name: result-backend
    runtime: python
    plan: free
    branch: main
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com,.vercel.app,result-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: result-db
          property: connectionString

databases:
  - name: result-db
    databaseName: result_db
    user: result_user